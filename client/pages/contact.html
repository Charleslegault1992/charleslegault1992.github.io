<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet"> 
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <title>Contact</title>
</head>
<body>
    <header>
        <nav>
            <img src="../images/napster.png" alt="logo napster">
            <ul>
                <li><a href="../../index.html">Accueil<i class="fa-solid fa-house"></i></a></li>
                <li><a href="./loisirs.html">Horaires & Loisirs<i class="fa-solid fa-calendar-days"></i></a></li>
                <li><a href="./portfolio.html">Portfolio<i class="fa-solid fa-briefcase"></i></a></li>
                <li><a href="./contact.html">Contact<i class="fa-solid fa-phone"></i></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>
            FORMULAIRE DE CONTACT
            <i class="fa-solid fa-phone"></i>
        </h1>
        <section>
            <p id="textcontact">Veuillez remplir ce formulaire de manière complète.</p>
        </section>
        <section>
            <form action="../../serveur/traitement.php" method="POST" autocomplete="on">
                <fieldset>
                    <legend>Vos coordonnées</legend>
                    <div class="bloc-formulaire">                        
                        <label for="nom">Nom complet : </label>
                        <input type="text" id="nom" name="nom" pattern="[A-Za-zÀ-ÿ\s-]+[A-Za-zÀ-ÿ]" required minlength="3" maxlength="100" placeholder="Entrez votre nom complet" title="Entrer un nom valide">
                        <br>
                        <label for="email">Adresse courriel :</label>
                        <input type="email" id="email" name="email" placeholder="Entrez votre email" required>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Détails de votre demande</legend>
                    <div class="bloc-formulaire">
                        <label for="motif">Motif principal :</label>
                        <select name="motif" id="motif" required>
                            <option value="" disabled selected>Choisir un motif</option>
                            <option value="projet">Proposition de projet</option>
                            <option value="info">Demande d'information</option>
                            <option value="support">Support technique</option>
                            <option value="collaboration">Collaboration</option>
                        </select>
                    </div>
                    
                    <div class="bloc-formulaire">
                        <p>Vous etes : </p>
                        <div class="radio-group">
                            <input type="radio" id="statut_etudiant" name="statut" value="etudiant" required>
                            <label for="statut_etudiant">Un étudiant</label>
                            <input type="radio" id="statut_prof" name="statut" value="professeur">
                            <label for="statut_prof">Un professeur</label>
                            <input type="radio" id="statut_pro" name="statut" value="professionnel">
                            <label for="statut_pro">Un professionnel</label>
                        </div>
                    </div>
                    
                    <div class="bloc-formulaire">
                        <label class="label_comment" for="message">Votre message détaillé : </label>
                        <textarea name="message" id="message" placeholder="Ecrire votre message..." rows="4"></textarea>
                    </div>
                </fieldset>
                <fieldset class="info-lettre">
                    <input class="checkbox" type="checkbox" id="infolettre" name="infolettre" value="oui">
                    <label for="infolettre">Je souhaite m'abonner à l'infolettre.</label>
                </fieldset>
                <button type="submit">Envoyer la demande</button>            
            </form>
        </section>
    </main>
    <footer>
        <i class="fa-regular fa-copyright"></i>
        2026 - TP1 - Présenté par Charles Legault
        <i class="fa-solid fa-code"></i>
    </footer>  
</body>
</html>
