<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
    <script src="./js/main.js" defer></script>
    <link rel="stylesheet" href="./css/style.css" />
    <title>No name yet Online</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <section class="navbar-gauche">
            <a class="navbar-brand" href="#"
              ><img
                src="./images/icone.png"
                alt="Logo"
                class="d-inline-block align-text-top logo"
              />No name yet Online</a
            >
          </section>
          <section class="navbar-droite">
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav"
              aria-controls="navbarNav"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="#"
                    >Home</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Game</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Account</a>
                </li>
              </ul>
            </div>
          </section>
        </div>
      </nav>
    </header>
    <main>
      <div class="boite-principal">
        <section class="entete-jeux">
          <div class="boite-titre">
            <h3 class="titre">No name yet Online</h3>
          </div>
        </section>
        <section class="boite-jeux" id="boite-jeux">
          <section class="jeux-gauche jeux-panneau">
            <div id="player-stats" class="boite-panneau"></div>
          </section>
          <section class="jeux" id="game">
            <div id="player">
              <img src="./images/player.png" alt="joueur" />
            </div>
          </section>
          <section class="jeux-droite jeux-panneau">
            <div id="player-inventory" class="boite-panneau"></div>
            
          </section>
        </section>
      </div>
    </main>
  </body>
</html>
